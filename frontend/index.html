<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OrbiiAI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-container">
    <header class="header">
      <h1>OrbiiAI</h1>
      <p>Your privacy-first desktop assistant</p>
    </header>

    <div id="chat-container" class="chat-container"></div>

    <div class="input-area">
      <input
        type="text"
        id="user-input"
        placeholder="Ask Orbii anything..."
        autocomplete="off"
      />
      <button onclick="sendMessage()">Send</button>
      <button id="mic-btn" onclick="startVoice()">🎤</button>
    </div>
    

  </div>

  <script src="script.js"></script>
</body>
</html>
