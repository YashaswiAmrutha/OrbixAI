<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrbixAI - Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <div class="layout-wrapper">

    <div class="app-container">
      <header class="header">
        <div class="header-content">
          <div class="header-title">
            <h1>OrbixAI</h1>
            <p class="header-subtitle">Your intelligent assistant</p>
          </div>
          <div class="header-right">
            <button class="icon-btn" id="voice-mute-btn" title="Toggle voice reply">
              <svg class="voice-icon voice-icon-on" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="2" width="6" height="11" rx="3"></rect>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="22"></line>
                <line x1="8" y1="22" x2="16" y2="22"></line>
              </svg>
              <svg class="voice-icon voice-icon-off" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="2" width="6" height="11" rx="3"></rect>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="22"></line>
                <line x1="8" y1="22" x2="16" y2="22"></line>
                <line class="strike-line" x1="2" y1="2" x2="22" y2="22"></line>
              </svg>
            </button>
            <button class="icon-btn" id="theme-toggle" title="Toggle theme">
              <svg class="theme-icon theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
              </svg>
              <svg class="theme-icon theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <div class="chat-container" id="chat-container"></div>

      <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off" />
        <button class="icon-btn btn-voice" id="mic-btn" title="Send voice message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="11" rx="3"></rect>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="22"></line>
            <line x1="8" y1="22" x2="16" y2="22"></line>
          </svg>
        </button>
        <button class="icon-btn btn-send" id="send-btn" title="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <div class="email-sidebar" id="floating-mail-widget">
      <div class="mail-container" id="mail-container">
        <div class="mail-header">
          <div class="mail-header-left">
            <span class="mail-title">Emails</span>
            <span class="mail-auto-update" id="mail-auto-update" title="Auto-updating emails">&#9679;</span>
          </div>
          <div class="mail-header-right">
            <button class="mail-refresh-btn" id="mail-refresh-btn" title="Refresh emails manually">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6"></path>
                <path d="M2.5 22v-6h6"></path>
                <path d="M2 11.5a10 10 0 0 1 18.8-4.3"></path>
                <path d="M22 12.5a10 10 0 0 1-18.8 4.3"></path>
              </svg>
            </button>
            <button class="mail-toggle-btn" id="mail-toggle-btn" title="Toggle emails">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="mail-list" id="mail-list">
          <div class="mail-item placeholder">
            <p>Loading emails...</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="modal" id="mail-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Send Email & Create Meeting</h2>
        <button class="modal-close" id="modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="mail-form">
          <div class="form-group">
            <label for="recipient-email">Recipient Email:</label>
            <input type="email" id="recipient-email" required />
          </div>
          <div class="form-group">
            <label for="mail-prompt">Email Purpose/Prompt:</label>
            <textarea id="mail-prompt" placeholder="e.g., Schedule a meeting to discuss project roadmap"
              rows="4"></textarea>
          </div>
          <div class="form-group checkbox">
            <input type="checkbox" id="create-meet" checked />
            <label for="create-meet">Create Google Meet</label>
          </div>
          <div class="form-group checkbox">
            <input type="checkbox" id="use-llm" checked />
            <label for="use-llm">Generate subject & body with AI</label>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Send Email</button>
            <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay"></div>

  <script src="/static/script.js"></script>
</body>

</html>
